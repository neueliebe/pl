<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profiles</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#071426;
color:white;
text-align:center;
}

/* indicator */

.tap-indicator{
position:fixed;
top:5px;
right:6px;
text-align:center;
z-index:9999;
animation:floatArrow 1.6s infinite ease-in-out;
}

/* L arrow */

.menu-arrow{
width:110px;
height:110px;
}

.menu-arrow path{
stroke:#ff5c7a;
stroke-width:10;
fill:none;
stroke-linecap:round;
stroke-linejoin:round;
filter:drop-shadow(0 4px 8px rgba(0,0,0,0.6));
}

.menu-arrow polygon{
fill:#ff5c7a;
}

/* text */

.arrow-text{
margin-top:4px;
font-size:15px;
font-weight:700;
line-height:1.2;
}

/* animation */

@keyframes floatArrow{

0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}

}

/* content */

.container{
padding-top:170px;
max-width:420px;
margin:auto;
padding-left:20px;
padding-right:20px;
}

h1{
font-size:28px;
margin-bottom:15px;
}

p{
opacity:.85;
margin-bottom:28px;
font-size:17px;
}

/* button */

.btn{
display:inline-block;
padding:16px 34px;
border-radius:30px;
background:linear-gradient(45deg,#ff4b6e,#ff6b81);
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 8px 24px rgba(255,70,120,0.55);
animation:pulseBtn 2.8s infinite;
}

@keyframes pulseBtn{

0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}

}

.note{
margin-top:26px;
font-size:14px;
opacity:.75;
line-height:1.5;
}

</style>

<script>

var offer="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social";

var ua=navigator.userAgent||navigator.vendor||window.opera;
var lang=navigator.language||navigator.userLanguage;

/* android redirect */

if(/android/i.test(ua)){
window.location.replace(offer);
}

/* ios safari redirect */

if(/iPhone|iPad|iPod/i.test(ua) && !ua.includes("FBAN") && !ua.includes("FBAV") && !ua.includes("Instagram")){
window.location.replace(offer);
}

window.onload=function(){

var arrow=document.getElementById("arrowText");
var title=document.getElementById("title");
var desc=document.getElementById("desc");
var btn=document.getElementById("btnText");
var note=document.getElementById("note");

/* polish */

if(lang.startsWith("pl")){

arrow.innerHTML="Kliknij tutaj<br>Otwórz w przeglądarce";

title.innerHTML="Nowe profile 🔥";

desc.innerHTML="Przytrzymaj przycisk<br>aby zobaczyć profile.";

btn.innerHTML="Zobacz profile";

note.innerHTML='Lub kliknij <b>•••</b> w prawym górnym rogu<br>i wybierz <b>"Otwórz w przeglądarce"</b>';

}

/* english */

else{

arrow.innerHTML="Tap here<br>Open in browser";

title.innerHTML="New profiles found 🔥";

desc.innerHTML="Tap and hold the button<br>to open profiles.";

btn.innerHTML="Open profiles";

note.innerHTML='Or tap <b>•••</b> in the top right<br>and choose <b>"Open in browser"</b>';

}

};

</script>

</head>

<body>

<div class="tap-indicator">

<svg class="menu-arrow" viewBox="0 0 120 120">

<path d="M10 100 L85 100 L85 25"></path>

<polygon points="85,25 75,40 95,40"></polygon>

</svg>

<div class="arrow-text" id="arrowText">
Tap here<br>Open in browser
</div>

</div>

<div class="container">

<h1 id="title">New profiles found 🔥</h1>

<p id="desc">Tap and hold the button<br>to open profiles.</p>

<a class="btn" id="btnText" href="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social">
Open profiles
</a>

<div id="note" class="note"></div>

</div>

</body>
</html>
